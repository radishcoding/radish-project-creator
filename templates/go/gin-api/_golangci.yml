version: "2"
run:
  timeout: 5m
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosec
    - revive
    - gocritic
    - misspell
    - bodyclose
    - noctx
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx
